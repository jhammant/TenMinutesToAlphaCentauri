<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="28%" cy="38%" r="95%">
      <stop offset="0%" stop-color="#1b2550"/>
      <stop offset="45%" stop-color="#0a0e2a"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#a8dbff"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="alpha" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#ff6b5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#ff6b5e"/>
    </linearGradient>
    <linearGradient id="streak" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#7fd1ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- starfield: many small dots -->
  <g fill="#ffffff">
    <circle cx="40" cy="80" r="1.2" opacity="0.7"/>
    <circle cx="120" cy="40" r="0.8" opacity="0.5"/>
    <circle cx="200" cy="120" r="1" opacity="0.6"/>
    <circle cx="310" cy="60" r="0.6" opacity="0.4"/>
    <circle cx="420" cy="95" r="1.4" opacity="0.8"/>
    <circle cx="520" cy="30" r="0.7" opacity="0.5"/>
    <circle cx="650" cy="100" r="1" opacity="0.7"/>
    <circle cx="760" cy="50" r="0.8" opacity="0.5"/>
    <circle cx="870" cy="130" r="1.2" opacity="0.7"/>
    <circle cx="980" cy="70" r="0.6" opacity="0.4"/>
    <circle cx="1090" cy="110" r="1" opacity="0.6"/>
    <circle cx="1160" cy="40" r="0.8" opacity="0.5"/>

    <circle cx="80" cy="200" r="1" opacity="0.6"/>
    <circle cx="260" cy="250" r="0.7" opacity="0.5"/>
    <circle cx="380" cy="190" r="1.3" opacity="0.75"/>
    <circle cx="490" cy="240" r="0.6" opacity="0.4"/>
    <circle cx="640" cy="210" r="1" opacity="0.65"/>
    <circle cx="760" cy="260" r="0.8" opacity="0.5"/>
    <circle cx="900" cy="200" r="1.2" opacity="0.7"/>
    <circle cx="1040" cy="250" r="0.6" opacity="0.4"/>
    <circle cx="1140" cy="200" r="1" opacity="0.6"/>

    <circle cx="30" cy="350" r="0.9" opacity="0.55"/>
    <circle cx="150" cy="420" r="1.4" opacity="0.8"/>
    <circle cx="300" cy="380" r="0.7" opacity="0.5"/>
    <circle cx="440" cy="440" r="1" opacity="0.6"/>
    <circle cx="560" cy="370" r="0.6" opacity="0.4"/>
    <circle cx="690" cy="450" r="1.2" opacity="0.7"/>
    <circle cx="820" cy="390" r="0.8" opacity="0.5"/>
    <circle cx="940" cy="450" r="0.6" opacity="0.4"/>
    <circle cx="1070" cy="380" r="1.1" opacity="0.65"/>
    <circle cx="1175" cy="440" r="0.7" opacity="0.5"/>

    <circle cx="60" cy="530" r="1" opacity="0.6"/>
    <circle cx="200" cy="580" r="0.8" opacity="0.5"/>
    <circle cx="360" cy="550" r="1.3" opacity="0.75"/>
    <circle cx="480" cy="600" r="0.6" opacity="0.4"/>
    <circle cx="620" cy="540" r="1" opacity="0.6"/>
    <circle cx="760" cy="590" r="0.7" opacity="0.5"/>
    <circle cx="890" cy="530" r="1.2" opacity="0.7"/>
    <circle cx="1030" cy="580" r="0.8" opacity="0.5"/>
    <circle cx="1150" cy="540" r="1" opacity="0.6"/>
  </g>

  <!-- Motion streak connecting Sun to alpha Cen -->
  <rect x="160" y="393" width="880" height="3" fill="url(#streak)" opacity="0.65" filter="url(#glow)"/>
  <rect x="160" y="394" width="880" height="1.4" fill="url(#streak)" opacity="0.9"/>

  <!-- Sun (left endpoint) -->
  <circle cx="160" cy="395" r="60" fill="url(#sun)" opacity="0.55"/>
  <circle cx="160" cy="395" r="18" fill="#a8dbff"/>
  <circle cx="160" cy="395" r="9" fill="#ffffff"/>

  <!-- Alpha Centauri (right endpoint) -->
  <circle cx="1040" cy="395" r="70" fill="url(#alpha)" opacity="0.6"/>
  <circle cx="1040" cy="395" r="22" fill="#ffd27a"/>
  <circle cx="1040" cy="395" r="11" fill="#ffffff"/>

  <!-- Tiny endpoint labels -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#9aa3c7" font-size="18" letter-spacing="0.08em">
    <text x="160" y="495" text-anchor="middle" fill="#7fd1ff">SUN</text>
    <text x="1040" y="495" text-anchor="middle" fill="#ffb347">α CENTAURI</text>
    <text x="600" y="420" text-anchor="middle" fill="#7a82a8" font-size="15">4.37 LIGHT-YEARS</text>
  </g>

  <!-- Section badge -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <text x="80" y="110" fill="#ffb347" font-size="22" letter-spacing="0.25em">RELATIVITY · INTERACTIVE</text>
  </g>

  <!-- Title -->
  <g font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="80" y="215" fill="url(#title)" font-size="96" font-weight="700" letter-spacing="-0.02em">Ten Minutes to</text>
    <text x="80" y="315" fill="url(#title)" font-size="96" font-weight="700" letter-spacing="-0.02em">Alpha Centauri.</text>
  </g>

  <!-- Subtitle -->
  <g font-family="'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" fill="#c8cee8">
    <text x="80" y="560" font-size="30" font-weight="400">4.37 light-years away — but only 10 minutes on your watch.</text>
  </g>

  <!-- Footer -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#7a82a8" font-size="18" letter-spacing="0.18em">
    <text x="80" y="605">γ ≈ 230,000   ·   β ≈ 1 − 9.5×10⁻¹²   ·   DRAG THE SPEED DIAL</text>
  </g>
</svg>
